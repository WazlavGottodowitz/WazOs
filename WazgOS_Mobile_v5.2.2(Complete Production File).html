<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WazgOS Mobile UI Engine v5.2.2</title>
  <style>
    :root { 
      --main: #00ff41; 
      --bg: #020202; 
      --panel: #0d0d0d; 
      --accent: #ff00ff; 
      --border: #222;
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: var(--bg); 
      color: var(--main); 
      font-family: 'Courier New', monospace; 
      margin: 0; 
      padding: 0; 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      overflow: hidden; 
    }
    
    .term { 
      background: #000; 
      height: 100px; 
      overflow-y: auto; 
      padding: 10px; 
      font-size: 11px; 
      border-bottom: 1px solid #333; 
      flex-shrink: 0;
      line-height: 1.4;
    }
    
    .workspace { 
      flex-grow: 1; 
      overflow-y: auto; 
      padding: 15px; 
      padding-bottom: 90px; 
    }
    
    .plugin-panel { display: none; }
    .plugin-panel.active { display: block; animation: panelFade 0.2s ease-out; }
    
    .group { 
      margin-bottom: 15px; 
      background: var(--panel); 
      padding: 12px; 
      border: 1px solid var(--border); 
      border-radius: 4px; 
    }
    
    label { 
      display: block; 
      font-size: 10px; 
      text-transform: uppercase; 
      color: #777; 
      margin-bottom: 6px; 
      letter-spacing: 1px;
    }
    
    input[type="text"], input[type="number"], select { 
      width: 100%; 
      background: #000; 
      color: var(--main); 
      border: 1px solid #333; 
      padding: 12px; 
      font-size: 14px; 
      margin-bottom: 8px;
      border-radius: 2px;
    }
    
    input[type="range"] { 
      width: 100%; 
      margin: 12px 0; 
      accent-color: var(--main); 
    }
    
    .row { display: flex; gap: 10px; }
    .row > div { flex: 1; }
    
    .check-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 8px; 
      font-size: 11px; 
    }
    
    .check-item { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      background: #000; 
      padding: 10px; 
      border: 1px solid #1a1a1a; 
    }
    
    .btn-gen { 
      position: fixed; 
      bottom: 65px; 
      left: 10px; 
      width: calc(100% - 20px); 
      padding: 15px; 
      background: var(--accent); 
      color: #000; 
      font-weight: bold; 
      border: none; 
      text-transform: uppercase; 
      font-size: 13px; 
      border-radius: 4px; 
      box-shadow: 0 4px 20px rgba(255, 0, 255, 0.25); 
      z-index: 10; 
    }
    
    .nav-bar { 
      position: fixed; 
      bottom: 0; 
      width: 100%; 
      height: 55px; 
      background: #000; 
      border-top: 1px solid #222; 
      display: flex; 
      z-index: 20; 
    }
    
    .nav-btn { 
      flex: 1; 
      background: none; 
      border: none; 
      color: #444; 
      font-size: 10px; 
      font-weight: bold; 
      text-transform: uppercase; 
      cursor: pointer; 
    }
    
    .nav-btn.active { 
      color: var(--main); 
      border-top: 3px solid var(--main); 
      background: #080808; 
    }
    
    @keyframes panelFade { 
      from { opacity: 0; transform: translateY(4px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
  </style>
</head>
<body>

  <div class="term" id="log">WAZGOS MOBILE MATRIX v5.2.2 ONLINE. SYNTAX CONFLICT RESOLVED.</div>

  <div class="workspace" id="gesture-matrix">
    
    <div id="tab-core" class="plugin-panel active">
      <div class="group">
        <label>Primary Prompt String</label>
        <input type="text" id="prompt" placeholder="Core mechanical or biological subject">
        <label>Negative Conditioning</label>
        <input type="text" id="negative" placeholder="blurry, asymmetrical, bad anatomy">
      </div>
      <div class="group">
        <div class="row">
          <div>
            <label>Dimension Preset</label>
            <select id="size"><option>1024x1024</option><option>800x1200</option><option>1920x1080</option></select>
          </div>
          <div>
            <label>Batch Allocation</label>
            <input type="number" id="batch" value="1" min="1" max="4">
          </div>
        </div>
        <div class="row" style="margin-top: 8px;">
          <div>
            <label>Guidance Scale (CFG)</label>
            <input type="number" id="cfg" value="7.0" step="0.5">
          </div>
          <div>
            <label>Seed Locker Status</label>
            <input type="text" id="seed" placeholder="Auto-Random Cycle">
          </div>
        </div>
      </div>
    </div>

    <div id="tab-rig" class="plugin-panel">
      <div class="group">
        <label>Active Modular Kinematic Profile</label>
        <select id="rig-profile">
          <option value="pentapod">Pentapod Rig Setup (5 Limbs)</option>
          <option value="biped">Bipedal Structural Rig (2 Limbs)</option>
          <option value="arachnid">Arachnid Quad-Pair Rig (8 Limbs)</option>
        </select>
        
        <label style="margin-top: 10px;">Sub-Rig Subsystem Activation</label>
        <div class="check-grid">
          <label class="check-item"><input type="checkbox" id="sub_head" checked> Cranial/Face</label>
          <label class="check-item"><input type="checkbox" id="sub_hands" checked> Digits/Hands</label>
          <label class="check-item"><input type="checkbox" id="sub_feet" checked> Podal/Feet</label>
          <label class="check-item"><input type="checkbox" id="sub_spine" checked> Medial Spine</label>
        </div>
      </div>
      <div class="group">
        <label>Universal Expression Library</label>
        <select id="expression-preset">
          <option value="NEUTRAL">Neutral State</option>
          <option value="JOY">Joy / Elated</option>
          <option value="RAGE">Rage / Aggressive</option>
          <option value="ANXIETY">Anxiety / Distressed</option>
          <option value="CONCENTRATION">Concentration / Focus</option>
        </select>
        
        <label style="margin-top: 10px;">Universal Motion Library</label>
        <select id="motion-preset">
          <option value="IDLE">Static Idle Loop</option>
          <option value="WALK">Locomotion: Walk</option>
          <option value="RUN">Locomotion: Run</option>
          <option value="VORTEX">Kinetic: Vortex Spin</option>
          <option value="DEFEND">Tactical: Defensive Crouch</option>
        </select>
      </div>
      <div class="group">
        <label>Rig Geometry Circle Offset</label>
        <input type="range" id="circle-offset" min="-180" max="180" value="0">
      </div>
    </div>

    <div id="tab-motion" class="plugin-panel">
      <div class="group">
        <label>Global Seed / Keyframe Timeline Selector</label>
        <input type="range" id="timeline" min="0" max="720" value="0">
        <div style="font-size: 12px; text-align: right; color: #888;">Frame Array Index: <span id="frame-num">0</span>/720</div>
      </div>
      <div class="group">
        <label>Vector Domain Monitoring Subsystem</label>
        <div class="row">
          <div>
            <label>Linear Path Magnitude</label>
            <input type="range" id="v-linear" min="0" max="100" value="15">
          </div>
          <div>
            <label>Vortex Rotational Torque</label>
            <input type="range" id="v-vortex" min="-100" max="100" value="0">
          </div>
        </div>
      </div>
    </div>

    <div id="tab-oracle" class="plugin-panel">
      <div class="group" style="border-color: #555;">
        <label>Pipeline Trajectory Intercept Options</label>
        <select id="veto-state">
          <option value="false">Automatic Mode (Continuous Run)</option>
          <option value="true">Intercept Frame Execution (Enable Manual Veto)</option>
        </select>
      </div>
      <div class="group">
        <label>System Maintenance Tools</label>
        <div class="row">
          <button style="flex: 1; background: #333; color: #fff; padding: 12px; border: none; font-family: monospace;" onclick="document.getElementById('file-loader').click()">LOAD PLUGINS</button>
          <button style="flex: 1; background: #442222; color: #ff8888; padding: 12px; border: none; font-family: monospace;" onclick="localStorage.clear(); location.reload();">CLEAR ENGINE</button>
        </div>
        <input type="file" id="file-loader" multiple style="display: none;">
      </div>
    </div>

  </div>

  <button class="btn-gen" id="action-trigger">Run Isolated Generator Pipeline</button>

  <div class="nav-bar">
    <button class="nav-btn active" id="btn-core">Parameters</button>
    <button class="nav-btn" id="btn-rig">Rig Lab</button>
    <button class="nav-btn" id="btn-motion">Vectors</button>
    <button class="nav-btn" id="btn-oracle">Oracle</button>
  </div>

  <script>
    const systemLog = (message) => {
      const container = document.getElementById('log');
      container.innerHTML += `<div>> ${message}</div>`;
      container.scrollTop = container.scrollHeight;
    };

    const TabRegistry = ['core', 'rig', 'motion', 'oracle'];
    let activeIndex = 0;

    function navigateToTab(targetId) {
      activeIndex = TabRegistry.indexOf(targetId);
      document.querySelectorAll('.plugin-panel').forEach(panel => panel.classList.remove('active'));
      document.getElementById(`tab-${targetId}`).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn-${targetId}`).classList.add('active');
    }

    TabRegistry.forEach(id => {
      document.getElementById(`btn-${id}`).addEventListener('click', () => navigateToTab(id));
    });

    let dragStartPos = 0;
    const swipeArea = document.getElementById('gesture-matrix');

    swipeArea.addEventListener('touchstart', (event) => {
      dragStartPos = event.changedTouches[0].screenX;
    }, { passive: true });

    swipeArea.addEventListener('touchend', (event) => {
      const dragEndPos = event.changedTouches[0].screenX;
      const deltaDistance = dragEndPos - dragStartPos;
      const movementThreshold = 65;

      if (deltaDistance < -movementThreshold) {
        const forwardIndex = (activeIndex + 1) % TabRegistry.length;
        navigateToTab(TabRegistry[forwardIndex]);
      } else if (deltaDistance > movementThreshold) {
        const backwardIndex = (activeIndex - 1 + TabRegistry.length) % TabRegistry.length;
        navigateToTab(TabRegistry[backwardIndex]);
      }
    }, { passive: true });

    document.getElementById('timeline').addEventListener('input', (event) => {
      document.getElementById('frame-num').innerText = event.target.value;
    });

    document.getElementById('action-trigger').addEventListener('click', async () => {
      systemLog('--- ENGINE CORE PIPELINE INITIALIZED ---');
      
      const stateSnapshot = {
        prompt: document.getElementById('prompt').value || "Abstract algorithmic entity",
        negative: document.getElementById('negative').value,
        dimensions: document.getElementById('size').value,
        batchCount: parseInt(document.getElementById('batch').value),
        cfgScale: parseFloat(document.getElementById('cfg').value),
        activeFrame: parseInt(document.getElementById('timeline').value),
        rigProfile: document.getElementById('rig-profile').value,
        expressionPreset: document.getElementById('expression-preset').value,
        motionPreset: document.getElementById('motion-preset').value,
        offsetAngle: parseInt(document.getElementById('circle-offset').value),
        linearMagnitude: parseInt(document.getElementById('v-linear').value),
        vortexTorque: parseInt(document.getElementById('v-vortex').value),
        vetoEnabled: document.getElementById('veto-state').value === "true",
        subRigs: {
          head: document.getElementById('sub_head').checked,
          hands: document.getElementById('sub_hands').checked,
          feet: document.getElementById('sub_feet').checked,
          spine: document.getElementById('sub_spine').checked
        }
      };

      const runtimeSeed = document.getElementById('seed').value || Math.floor(Math.random() * 9999999);
      if(!document.getElementById('seed').value) {
         document.getElementById('seed').value = runtimeSeed;
      }

      let pipelineData = stateSnapshot;
      
      {
        const sortedKeys = Object.keys(localStorage).filter(k => k.startsWith("isg_")).sort();

        for (const moduleKey of sortedKeys) {
          try {
            const rawSource = localStorage.getItem(moduleKey);
            const binaryBlob = new Blob([rawSource], { type: 'text/javascript' });
            const internalUrl = URL.createObjectURL(binaryBlob);
            const executableModule = await import(internalUrl);
            const pluginInstance = new executableModule.default();
            
            pipelineData = await pluginInstance.apply(runtimeSeed, { 
              terminal: systemLog, 
              lastOutput: pipelineData 
            });
          } catch(pipelineError) {
            systemLog(`<span style="color:red">CRITICAL EXTENSION ERR [${moduleKey}]: ${pipelineError.message}</span>`);
          }
        }
      }
      
      if(stateSnapshot.vetoEnabled) {
        systemLog(`<span style="color:#ff00ff">ORACLE HALT: Pipeline isolated. Render payload paused.</span>`);
      } else {
        systemLog(`Sequence completed successfully. Payload parsed.`);
      }
    });

    document.getElementById('file-loader').addEventListener('change', function() {
      for (const uploadedFile of this.files) {
        uploadedFile.text().then(fileContent => {
          const processedKey = "isg_" + uploadedFile.name.replace('.js.txt', '').replace('.js', '');
          localStorage.setItem(processedKey, fileContent);
          systemLog(`Successfully Compiled Local Plugin Array Module: [${uploadedFile.name}]`);
        });
      }
    });
  </script>
</body>
</html>
