<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>WazOs - VST-Biomechanik-Engine</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; }
        #log-container { height: 100px; overflow-y: scroll; border: 1px solid #333; padding: 5px; }
        #waz-svg-canvas { width: 100vw; height: 70vh; border: 1px solid #0f0; display: block; }
        button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="controls">
        <button onclick="window.WazgManager.dispatch('ADD_NODE', {x: Math.random()*500, y: Math.random()*300}, event)">ADD JOINT</button>
        <button onclick="window.WazgManager.dispatch('CLEAR_WORKSPACE', null, event)">CLEAR ALL</button>
    </div>
    <div id="log-container"></div>
    <svg id="waz-svg-canvas"></svg>

    <script src="src/plugins/isg_997_WazLogger.js"></script>
    <script src="src/core/WazgManager.js"></script>
    <script src="src/core/WazgAnatomy.js"></script>
    <script>
        window.onload = () => {
            try {
                window.WazgManager.init();
                window.WazgAnatomy.init();
                console.log("System bereit.");
            } catch(e) { console.error("Start-Fehler:", e); }
        };
    </script>
</body>
</html>
