<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>wazOS v66.0 - Keyframe Animations</title>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; background:#0a0a0a; font-family:'Courier New', monospace; overflow:hidden; color:#00ff00; touch-action: manipulation; }
    #waz-container { position:relative; width:100%; height:100vh; }
    #waz-header { height:44px; background:#1a1a1a; border-bottom:1px solid #004400; display:flex; align-items:center; padding:0 10px; }
    .guide-label { color:#00ff00; font-size:11px; cursor:pointer; }
    .ticker-wrapper { flex:1; overflow:hidden; background:#111; height:20px; margin-left:10px; border:1px solid #002200; position:relative; }
    #ticker-text { color:#00cc00; font-size:10px; line-height:20px; position:absolute; white-space:nowrap; animation: ticker 35s linear infinite; }
    
    @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    #waz-workspace { height:calc(100vh - 144px); position:relative; background:#151515; overflow:hidden; }
    #waz-svg-canvas { position:absolute; top:0; left:0; width:100%; height:100%; }

    #waz-terminal { height:100px; background:rgba(20,20,20,0.95); border-top:2px solid #00ff00; position:absolute; bottom:0; left:0; right:0; overflow-y:auto; }
    #waz-terminal-text { padding:6px 8px; font-size:10px; line-height:1.3; white-space:pre-wrap; }

    /* === KEYFRAME ANIMATIONS === */
    
    /* Button Press */
    @keyframes buttonPress {
      0% { transform: scale(1); }
      50% { transform: scale(0.92); }
      100% { transform: scale(1); }
    }

    /* Glow Pulse */
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(0, 255, 136, 0.4); }
      50% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.8); }
    }

    /* Frame Transition */
    @keyframes frameCrossfade {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.96); }
    }

    /* Success Flash */
    @keyframes successFlash {
      0% { background: #1a1a1a; }
      30% { background: #112211; }
      100% { background: #1a1a1a; }
    }

    /* UI Button Style */
    .ui-button {
      transition: all 0.1s ease;
    }
    .ui-button:active {
      animation: buttonPress 0.2s ease;
    }
    .ui-button.glow {
      animation: glowPulse 2s infinite;
    }
  </style>
</head>
<body>

  <div id="waz-container">
    <div id="waz-header">
      <label class="guide-label">
        <input type="checkbox" id="chk-guide" checked onchange="toggleGuide()"> 🧠
      </label>
      <div class="ticker-wrapper">
        <div id="ticker-text">wazOS v66.0 • CSS Keyframe Animations Active</div>
      </div>
    </div>

    <div id="waz-workspace">
      <svg id="waz-svg-canvas" width="100%" height="100%"></svg>
    </div>

    <div id="waz-terminal">
      <div id="waz-terminal-text">> (BOOT) CSS Keyframe Animations loaded...</div>
    </div>
  </div>

  <script>
    // ... your existing boot code and modules ...

    // Example: Add glow effect to buttons dynamically
    function addButtonEffects() {
      document.querySelectorAll('.ui-button').forEach(btn => {
        btn.classList.add('ui-button');
        btn.addEventListener('click', () => {
          btn.style.animation = 'successFlash 0.6s';
          setTimeout(() => btn.style.animation = '', 600);
        });
      });
    }

    // Call after layout init
    // addButtonEffects();
  </script>
</body>
</html>
