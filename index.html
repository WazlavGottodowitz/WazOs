<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.ico">
    <title>WazOs</title>
</head>
<body>
    <div id="waz-log-view" style="color: #0f0; font-family: monospace; border: 1px solid #333; height: 100px; overflow-y: scroll;"></div>
    
    <script src="src/core/WazgLogger.js"></script>
    <script src="src/core/WazgManager.js"></script>
    <script src="src/core/WazgAnatomy.js"></script>
    
    <script>
        window.onload = () => {
            // Check ob alles da ist
            if (!window.WazgLogger) console.error("Logger fehlt!");
            if (!window.WazgManager) console.error("Manager fehlt!");
            
            try {
                window.WazgLogger.log("Systemstart...");
                window.WazgManager.init();
                window.WazgAnatomy.init();
                window.WazgLogger.log("VST-Bus bereit.");
            } catch (e) {
                console.error("CRITICAL BOOT ERROR:", e);
            }
        };
    </script>
</body>
</html>
