<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>wazOS v66.0 - Modular Frame System</title>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; background:#0a0a0a; font-family:'Courier New', monospace; overflow:hidden; color:#00ff00; touch-action: manipulation; }
    #waz-container { position:relative; width:100%; height:100vh; }
    #waz-header { height:44px; background:#1a1a1a; border-bottom:1px solid #004400; display:flex; align-items:center; padding:0 10px; }
    .guide-label { color:#00ff00; font-size:11px; cursor:pointer; }
    .ticker-wrapper { flex:1; overflow:hidden; background:#111; height:20px; margin-left:10px; border:1px solid #002200; position:relative; }
    #ticker-text { color:#00cc00; font-size:10px; line-height:20px; position:absolute; white-space:nowrap; animation: ticker 35s linear infinite; }
    @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    #waz-workspace { height:calc(100vh - 144px); position:relative; background:#151515; overflow:hidden; }
    #waz-svg-canvas { position:absolute; top:0; left:0; width:100%; height:100%; image-rendering: crisp-edges; }
    #waz-terminal { height:100px; background:rgba(20,20,20,0.95); border-top:2px solid #00ff00; position:absolute; bottom:0; left:0; right:0; overflow-y:auto; }
    #waz-terminal-text { padding:6px 8px; font-size:10px; line-height:1.3; white-space:pre-wrap; }

    .image-controls {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,26,26,0.95);
      border: 1px solid #00ff88;
      padding: 6px 10px;
      border-radius: 6px;
      display: flex;
      gap: 6px;
      z-index: 300;
    }
  </style>
</head>
<body>

  <div id="waz-container">
    <div id="waz-header">
      <label class="guide-label">
        <input type="checkbox" id="chk-guide" checked onchange="toggleGuide()"> 🧠
      </label>
      <div class="ticker-wrapper">
        <div id="ticker-text">wazOS v66.0 • Modular Architecture • Frame System</div>
      </div>
    </div>

    <div id="waz-workspace">
      <svg id="waz-svg-canvas" width="100%" height="100%"></svg>
    </div>

    <div id="waz-terminal">
      <div id="waz-terminal-text">> (BOOT) Starting modular frame system...</div>
    </div>
  </div>

  <script>
    const repoUser = "wazlavgottodowitz";
    const repoName = "WazOs";
    const branch   = "main";

    function safeLog(type, msg) {
      const term = document.getElementById("waz-terminal-text");
      if (!term) return;
      const time = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
      term.innerHTML += `(${time}) > (${type}) ${msg}<br>`;
      term.scrollTop = term.scrollHeight;
      if (term.children.length > 30) term.removeChild(term.children[0]);
    }

    async function injectWazOsModule(path) {
      const name = path.split('/').pop().replace('.js','');
      safeLog("BOOT", `Loading ${name}...`);
      try {
        const script = document.createElement('script');
        script.src = `https://cdn.jsdelivr.net/gh/${repoUser}/${repoName}@${branch}/${path}?t=${Math.floor(Date.now()/300000)}`;
        await new Promise((resolve, reject) => {
          script.onload = resolve;
          script.onerror = reject;
          setTimeout(reject, 12000);
          document.head.appendChild(script);
        });
        safeLog("BOOT", `${name} loaded`);
        return true;
      } catch (e) {
        safeLog("WARNING", `${name} failed`);
        return false;
      }
    }

    async function bootSystem() {
      safeLog("SYSTEM", "Starting modular frame system...");

      const modules = [
        'src/core/WazgLogcat.js',
        'src/core/WazgManager.js',
        'src/core/WazgGuard.js',
        'src/core/WazgAnatomy.js',
        'src/ui/WazgUI.js',
        'src/ui/WazgTheme.js',
        'src/ui/WazgAccessibility.js',
        'src/ui/WazgPanZoom.js',
        'src/ui/WazgFrameThrower.js',
        'src/ui/WazgLayout.js'
      ];

      for (const path of modules) {
        await injectWazOsModule(path);
        await new Promise(r => setTimeout(r, 250));
      }

      if (window.WazgManager) window.WazgManager.init();
      if (window.WazgGuard) window.WazgGuard.init();
      if (window.WazgAnatomy) window.WazgAnatomy.init();
      if (window.WazgTheme) window.WazgTheme.init();
      if (window.WazgAccessibility) window.WazgAccessibility.init();
      if (window.WazgPanZoom) window.WazgPanZoom.init();
      if (window.WazgFrameThrower) window.WazgFrameThrower.init();
      if (window.WazgLayout) window.WazgLayout.init();

      safeLog("SYSTEM", "wazOS v66.0 Modular Frame System Ready");
    }

    function toggleGuide() {
      const t = document.getElementById('ticker-text');
      if (t) t.style.display = document.getElementById('chk-guide').checked ? "block" : "none";
    }

    document.addEventListener("DOMContentLoaded", bootSystem);
  </script>
</body>
</html>
