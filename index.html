<!DOCTYPE html>
<html>
<body>
    <div id="controls">

    </div>
    <svg id="waz-svg-canvas" style="width:100%; height:80vh; border:1px solid #0f0;"></svg>

    <script src="src/core/WazgManager.js"></script>
    <script src="src/core/WazgAnatomy.js"></script>
    <script>
        window.onload = () => {
