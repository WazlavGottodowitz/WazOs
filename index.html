<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WazOs - Pro Interface</title>
    <style>
        /* CSS Variablen - Nano Matrix Theme */
        :root {
            --bg-main: #000000;
            --bg-panel: #0a0a0a;
            --bg-input: #1a1a1a;
            --accent: #00ff00;
            --text: #00dd00;
            --text-dim: #008800;
            --border: 1px solid #005500;
            --header-h: 30px;
            --term-h: 65px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: monospace; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg-main); color: var(--text); font-size: 11px;
        }

        /* --- HEADER & TICKER --- */
        #waz-tabs {
            position: absolute; top: 0; left: 0; width: 100%; height: var(--header-h);
            background: var(--bg-panel); border-bottom: var(--border);
            display: flex; align-items: center; padding: 0 5px; gap: 2px;
            overflow-x: auto; white-space: nowrap;
        }

        .tab-btn {
            background: transparent; color: var(--text-dim); border: none; 
            padding: 5px 10px; cursor: pointer; font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
        .tab-btn.active { color: var(--accent); background: #002200; border: 1px solid #005500; border-bottom: none; }

        /* NANO TICKER */
        #nano-ticker {
            margin-left: auto; color: var(--accent); font-size: 9px; padding: 0 5px;
            text-shadow: 0 0 2px #00ff00;
            max-width: 40%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        @media(max-width: 400px) {
            #nano-ticker { font-size: 8px; }
        }

        /* --- WORKSPACES --- */
        #workspace-container {
            position: absolute; top: var(--header-h); left: 0; right: 0; bottom: var(--term-h);
            overflow-y: auto; overflow-x: hidden;
        }

        .panel { width: 100%; height: 100%; display: none; padding: 5px; }
        .panel.active { display: block; }

        /* --- LAYOUT UTILS --- */
        .flex-row { display: flex; gap: 5px; align-items: center; margin-bottom: 5px; width: 100%; }
        .flex-col { display: flex; flex-direction: column; gap: 2px; width: 100%; }
        
        /* --- INPUTS & BUTTONS --- */
        label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
        input, textarea, select { 
            background: var(--bg-input); color: var(--accent); border: var(--border); 
            padding: 4px; font-size: 10px; width: 100%; resize: none; 
        }
        input:focus, textarea:focus, select:focus { outline: 1px solid var(--accent); }
        
        .btn { 
            background: #002200; color: var(--accent); border: var(--border); 
            padding: 4px 8px; cursor: pointer; font-size: 10px; text-transform: uppercase;
            white-space: nowrap;
        }
        .btn:active { background: var(--accent); color: #000; }

        /* --- T2I STUDIO --- */
        .studio-grid { display: grid; grid-template-columns: 1fr; gap: 5px; height: 100%; }
        @media(min-width: 600px) { .studio-grid { grid-template-columns: 300px 1fr; } }
        
        .controls-col { background: var(--bg-panel); padding: 5px; border: var(--border); overflow-y: auto; }
        
        .preview-col { 
            display: flex; flex-direction: column; border: var(--border); background: #050505; 
            position: relative; overflow: hidden;
        }
        
        .preview-header { 
            display: flex; justify-content: space-between; padding: 2px 5px; 
            background: var(--bg-input); border-bottom: var(--border); align-items: center;
        }
        
        .preview-canvas {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background-size: 20px 20px;
            background-image: linear-gradient(to right, #111 1px, transparent 1px), linear-gradient(to bottom, #111 1px, transparent 1px);
            overflow: hidden; position: relative;
        }
        
        #render-img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.2s; }

        /* --- MASCHINENRAUM --- */
        .plugin-chain { border: var(--border); padding: 5px; background: var(--bg-input); min-height: 100px; margin-top: 5px;}
        .plugin-item { display: flex; justify-content: space-between; background: #000; border: 1px solid #333; padding: 2px 5px; margin-bottom: 2px; font-size: 9px; cursor: grab; }

        /* --- NANO TERMINAL --- */
        #nano-terminal {
            position: absolute; bottom: 0; left: 0; width: 100%; height: var(--term-h);
            background: #000; border-top: 1px solid var(--accent); display: flex; flex-direction: column;
        }
        #term-log {
            flex: 1; overflow-y: auto; padding: 2px 5px; font-size: 8.5px; 
            line-height: 1.1; color: #00aa00;
        }
    </style>
</head>
<body>

    <nav id="waz-tabs">
        <button class="tab-btn active" data-target="tab-studio">T2I</button>
        <button class="tab-btn" data-target="tab-maschinenraum">CORE</button>
        <button class="tab-btn" data-target="tab-timeline">SEQ</button>
        <div id="nano-ticker">[ 148BPM | VRAM:OK ]</div>
    </nav>

    <div id="workspace-container">
        
        <div id="tab-studio" class="panel active">
            <div class="studio-grid">
                
                <div class="controls-col">
                    <div class="flex-col">
                        <label>Prompt</label>
                        <textarea id="t2i-prompt" rows="3">A cybernetic skull with neon green tubes, highly detailed, octane render</textarea>
                    </div>
                    
                    <div class="flex-col" style="margin-top:5px;">
                        <label>Negative</label>
                        <input type="text" id="t2i-negative" value="blurry, low quality, distortion">
                    </div>

                    <div class="flex-row" style="margin-top:5px;">
                        <div class="flex-col" style="flex:1;">
                            <label>Style</label>
                            <select id="t2i-style">
                                <option value="">Raw / None</option>
                                <option value="cyberpunk style, neon colors" selected>Cyberpunk</option>
                                <option value="anime style, studio ghibli">Anime</option>
                                <option value="photorealistic, 8k, ultra detailed">Photoreal</option>
                                <option value="psychedelic art, fractals, vivid colors">Psychedelic</option>
                            </select>
                        </div>
                        <div class="flex-col" style="flex:1;">
                            <label>Scale (%)</label>
                            <input type="number" id="ui-scale-input" value="100" min="10" max="200">
                        </div>
                    </div>

                    <div class="flex-row" style="margin-top:5px;">
                        <div class="flex-col" style="flex:3;">
                            <label>Flags / Params</label>
                            <input type="text" value="--v 5.2 --ar 1:1">
                        </div>
                        <div class="flex-col" style="flex:1;">
                            <label>Batch</label>
                            <input type="number" id="t2i-batch" value="1" min="1" max="4">
                        </div>
                    </div>

                    <div class="flex-row" style="margin-top:10px; justify-content: space-between;">
                        <button class="btn" style="flex: 2; background: var(--accent); color: #000; font-weight:bold;" onclick="generateImage()">GENERATE</button>
                        <button class="btn" style="flex: 1;" onclick="logTerminal('Seed reset.')">🎲 SEED</button>
                    </div>
                </div>

                <div class="preview-col">
                    <div class="preview-header">
                        <span style="font-size:9px; color:var(--text-dim);">PREVIEW_OUT</span>
                        <div class="flex-row" style="width:auto;">
                            <label>ZOOM</label>
                            <input type="range" id="preview-zoom" min="50" max="200" value="100" style="width:60px; height:2px;">
                        </div>
                    </div>
                    <div class="preview-canvas">
                        <img id="render-img" src="https://image.pollinations.ai/prompt/A%20cybernetic%20skull%20with%20neon%20green%20tubes,%20highly%20detailed,%20matrix%20style?width=512&height=512&nologo=true" alt="Render">
                    </div>
                </div>

            </div>
        </div>

        <div id="tab-maschinenraum" class="panel">
            <div class="flex-row">
                <button class="btn">+ ADD NODE</button>
                <button class="btn">GLOBAL SETTINGS</button>
            </div>
            
            <div style="margin-top: 10px;">
                <label>PLUGIN REIHENFOLGE (GUI)</label>
                <div class="plugin-chain">
                    <div class="plugin-item"><span>1. ImageGen_Base</span> <span>☰</span></div>
                    <div class="plugin-item"><span>2. Upscaler_4x</span> <span>☰</span></div>
                    <div class="plugin-item"><span>3. ColorCorrection_LUT</span> <span>☰</span></div>
                </div>
            </div>
            <div style="margin-top: 10px; height: 150px; border: var(--border); background: #020202; position: relative;">
                <span style="position:absolute; top:5px; left:5px; font-size:9px; color:#555;">NODE CANVAS (WIP)</span>
            </div>
        </div>

        <div id="tab-timeline" class="panel">
            <label>SEQUENCE EDITOR</label>
        </div>

    </div>

    <div id="nano-terminal">
        <div style="background: #111; border-bottom: 1px solid #333; padding: 2px 5px; font-size: 8px; color: var(--text-dim);">
            >_ SYSTEM.LOG
        </div>
        <div id="term-log">
            > WazOs Core loaded.<br>
            > UI initialized at 100% scale.<br>
            > Swipe-Gestures active.
        </div>
    </div>

    <script>
        // --- 1. Tab Navigation & ID-basiertes Switching ---
        const tabsArray = ['tab-studio', 'tab-maschinenraum', 'tab-timeline'];
        let currentTabIndex = 0;

        function switchTab(targetId) {
            const targetPanel = document.getElementById(targetId);
            if (!targetPanel) return;
            
            // Alle Panels verstecken
            document.querySelectorAll('.panel').forEach(panel => {
                panel.classList.remove('active');
            });
            // Alle Buttons deaktivieren
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Ziel aktivieren
            targetPanel.classList.add('active');
            const activeBtn = document.querySelector(`[data-target="${targetId}"]`);
            if (activeBtn) activeBtn.classList.add('active');
            
            // Halte den Index für das Swipen synchron
            currentTabIndex = tabsArray.indexOf(targetId);
            
            logTerminal(`Switched to ${targetId}`);
        }

        // Klick-Event an die data-target ID koppeln
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                switchTab(targetId);
            });
        });

        // Swipe Gestures
        let touchStartX = 0;
        document.getElementById('workspace-container').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        document.getElementById('workspace-container').addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 60) { // Swipe Links -> Vorwärts
                let nextIndex = Math.min(currentTabIndex + 1, tabsArray.length - 1);
                switchTab(tabsArray[nextIndex]);
            }
            if (touchEndX - touchStartX > 60) { // Swipe Rechts -> Zurück
                let prevIndex = Math.max(currentTabIndex - 1, 0);
                switchTab(tabsArray[prevIndex]);
            }
        }, {passive: true});

        // --- 2. Preview Zoom ---
        const zoomSlider = document.getElementById('preview-zoom');
        const renderImg = document.getElementById('render-img');
        zoomSlider.addEventListener('input', (e) => {
            renderImg.style.transform = `scale(${e.target.value / 100})`;
        });

        // --- 3. UI Scale (Global) ---
        const scaleInput = document.getElementById('ui-scale-input');
        scaleInput.addEventListener('change', (e) => {
            document.body.style.zoom = `${e.target.value}%`;
            logTerminal(`UI Scale set to ${e.target.value}%`);
        });

        // --- 4. Nano Terminal Logger ---
        const termLog = document.getElementById('term-log');
        function logTerminal(msg) {
            const time = new Date().toLocaleTimeString('de-DE', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
            termLog.innerHTML += `<br><span style="color:#555;">[${time}]</span> ${msg}`;
            termLog.scrollTop = termLog.scrollHeight;
        }

        // --- 5. T2I Generator Engine (Perchance Public Inline API Brücke) ---
        function generateImage() {
            const promptElement = document.getElementById('t2i-prompt');
            const styleElement = document.getElementById('t2i-style');
            const negElement = document.getElementById('t2i-negative');
            const imgElement = document.getElementById('render-img');
            
            if (!promptElement || !imgElement) return;

            const rawPrompt = promptElement.value.trim();
            const style = styleElement ? styleElement.value : "";
            const negative = negElement ? negElement.value : "blurry";
            
            if (rawPrompt === "") {
                logTerminal("<span style='color:red;'>FEHLER: Prompt ist leer.</span>");
                return;
            }

            const finalPrompt = style ? `${rawPrompt}, ${style}` : rawPrompt;
            
            logTerminal(`> Pipeline-Request abgesendet für: "${rawPrompt.substring(0, 20)}..."`);
            imgElement.style.opacity = "0.3"; 
            
            // Sendet die Daten hoch zum Perchance-Fenster über die Public API
            window.parent.postMessage({
                type: "WAZ_GENERATE",
                prompt: finalPrompt,
                negative: negative
            }, "*");
        }

        // Empfängt die fertige Bild-URL von Perchance zurück
        window.addEventListener("message", (event) => {
            const imgElement = document.getElementById('render-img');
            if (!imgElement) return;

            if (event.data && event.data.type === "WAZ_RENDER_DONE") {
                imgElement.src = event.data.url;
                imgElement.style.opacity = "1";
                logTerminal("<span style='color:var(--accent);'>> Render komplett via Perchance Engine. VRAM freigegeben.</span>");
            }
            
            if (event.data && event.data.type === "WAZ_RENDER_ERROR") {
                imgElement.style.opacity = "1";
                logTerminal(`<span style='color:red;'>> FEHLER: Perchance Inline API blockiert (${event.data.error})</span>`);
            }
        });
    </script>
</body>
</html>
