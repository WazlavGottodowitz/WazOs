<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WazOS // Nocturne UI (Simplified Grid)</title>
  <link rel="stylesheet" href="./css/theme.css">
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <nav class="waz-tabs" role="tablist">
    <button class="tab-btn active" data-target="tab-studio" type="button">✦ Studio (T2I)</button>
    <button class="tab-btn" data-target="tab-timeline" type="button">◉ Timeline & Hub</button>
    <button class="tab-btn" data-target="tab-maschinenraum" type="button">⚙ Maschinenraum</button>
  </nav>

  <main class="waz-viewport">
    
    <section id="tab-studio" class="tab-panel active">
      <div class="panel forge-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">IllusionGen V2 Engine</p>
            <h2>SmartAssist Prompt Forge</h2>
          </div>
          <div class="status-pill-group">
            <span class="status-pill" id="mode-pill">checking</span>
            <span class="status-pill" id="render-pill">idle</span>
          </div>
        </div>

        <div class="input-group">
          <textarea id="prompt-input" placeholder="V2 SmartAssist Prompt hier reinhacken..."></textarea>
        </div>
        
        <div class="forge-actions">
          <button id="generate-button" class="waz-btn primary">GENERATE BASE FRAME</button>
        </div>
      </div>

      <div class="panel stage-panel" id="preview-stage">
        <div class="frame-container">
          <div class="frame-overlay" id="render-overlay">BUFFER READY</div>
          <div class="frame-viewport" id="frame-viewport">
            <img id="render-img" src="" alt="WazOS Render Stage" loading="lazy">
          </div>
        </div>

        <div class="under-image-bar">
          <button id="action-frame0" class="action-btn" type="button">
            <span class="btn-glyph">📌</span> Use as Frame 0
          </button>
          <button id="action-framethrower" class="action-btn thrower" type="button">
            <span class="btn-glyph">🚀</span> FrameThrower (16x)
          </button>
        </div>
      </div>
    </section>

    <section id="tab-timeline" class="tab-panel">
      <div class="panel queue-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Sequence Buffer</p>
            <h2>Cluster Timeline (<span id="frame-count-readout">0</span>)</h2>
          </div>
          <button id="clear-queue-button" class="waz-btn danger">Clear Buffer</button>
        </div>
        <div class="queue-grid" id="queue-grid"></div>
      </div>
    </section>

    <section id="tab-maschinenraum" class="tab-panel">
      <div class="panel settings-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Configuration Matrix</p>
            <h2>Engine Parameters</h2>
          </div>
        </div>
        <div class="control-grid">
          <div class="input-group">
            <label for="negative-input">Negative Prompt</label>
            <input id="negative-input" type="text">
          </div>
          <div class="input-group">
            <label for="resolution-select">Resolution</label>
            <select id="resolution-select">
              <option value="512x512">512x512 (Fast)</option>
              <option value="768x768" selected>768x768 (Standard)</option>
              <option value="1024x1024">1024x1024 (HD)</option>
            </select>
          </div>
          <div class="input-group">
            <label for="flags-input">Guerilla Flags</label>
            <input id="flags-input" type="text" placeholder="--v 5.2 --chaos 8">
          </div>
          <div class="input-group">
            <label for="seed-input">Base Seed</label>
            <input id="seed-input" type="text" placeholder="Random">
          </div>
        </div>
      </div>
    </section>

    <section class="panel console-panel" id="console-panel">
      <div class="console-log" id="console-log"></div>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
