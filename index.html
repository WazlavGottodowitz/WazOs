<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>WazG-OS v13 - Modular</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; }
        #controls { padding: 10px; background: #111; border-bottom: 1px solid #333; }
        #log-container { height: 100px; overflow-y: scroll; border-bottom: 1px solid #0f0; padding: 5px; }
        #waz-svg-canvas { width: 100vw; height: calc(100vh - 160px); display: block; }
        button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div id="controls">
        <button id="btn-add-joint">ADD JOINT</button>
        <button id="btn-clear">CLEAR ALL</button>
    </div>
    
    <div id="log-container"></div>
    <svg id="waz-svg-canvas"></svg>

    <script src="src/plugins/isg_997_WazLogger.js"></script>
    <script src="src/core/WazgManager.js"></script>
    <script src="src/core/WazgAnatomy.js"></script>
    
    <script src="src/ui/UIController.js"></script>
</body>
</html>
